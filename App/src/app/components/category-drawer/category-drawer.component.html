@if (isOpen) {
  <div class="drawer-overlay" (click)="onOverlayClick($event)">
    <div class="drawer" [class.open]="isOpen">
      <div class="drawer-header">
        <h3>{{ textos.categoriasDrawer.titulo }}</h3>
        <button class="close-btn" (click)="onCloseDrawer()" [title]="textos.categoriasDrawer.botonCerrar">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      
      <div class="drawer-content">
        <div class="category-item" 
             [class.active]="selectedCategory === null"
             (click)="onCategorySelect(null)">
          <span class="category-name">{{ textos.categoriasDrawer.todas }}</span>
          <span class="category-count">{{ getTotalCount() }}</span>
        </div>
        
        @for (category of categories; track category.name) {
          <div class="category-item" 
               [class.active]="selectedCategory === category.name"
               (click)="onCategorySelect(category.name)">
            <span class="category-name">{{ category.name }}</span>
            <span class="category-count">{{ category.count }}</span>
          </div>
        }
      </div>
    </div>
  </div>
}
